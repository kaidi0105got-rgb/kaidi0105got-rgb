<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="土木工程與大地工程計算工具入口" />
  <title>ENG. TOOLBOX｜工程計算工具</title>
  <style>
    :root {
      --bg: #070807;
      --panel: #10120f;
      --line: #262a24;
      --muted: #92998c;
      --text: #f3f1e8;
      --accent: #ffb000;
      --green: #88b04b;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        var(--bg);
      background-size: 32px 32px;
      font-family: Inter, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }
    .shell { width: min(1180px, calc(100% - 40px)); margin: auto; }

    header {
      height: 76px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      background: rgba(7,8,7,.86);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    nav { display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; gap: 12px; align-items: center; font-weight: 800; letter-spacing: .08em; }
    .brand-mark {
      width: 34px; height: 34px; display: grid; place-items: center;
      color: #080808; background: var(--accent); transform: rotate(45deg);
    }
    .brand-mark span { transform: rotate(-45deg); }
    .nav-links { display: flex; gap: 26px; color: var(--muted); font-size: 14px; }
    .nav-links a:hover { color: var(--accent); }

    .hero { padding: 96px 0 76px; display: grid; grid-template-columns: 1.3fr .7fr; gap: 70px; align-items: end; }
    .eyebrow { color: var(--accent); font: 700 12px/1 monospace; letter-spacing: .18em; text-transform: uppercase; }
    h1 { font-size: clamp(52px, 8vw, 104px); line-height: .9; margin: 24px 0 28px; letter-spacing: -.065em; }
    h1 em { color: transparent; -webkit-text-stroke: 1px #777d72; font-style: normal; }
    .intro { color: var(--muted); font-size: 18px; line-height: 1.8; max-width: 620px; }
    .status { border-left: 1px solid var(--accent); padding: 0 0 0 24px; color: var(--muted); font: 13px/1.9 monospace; }
    .status strong { display: block; color: var(--text); font-size: 28px; }

    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 24px; border-top: 1px solid var(--line); padding-top: 28px; }
    h2 { margin: 0; font-size: clamp(28px, 4vw, 44px); letter-spacing: -.04em; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter {
      border: 1px solid var(--line); color: var(--muted); background: #0b0c0b;
      padding: 9px 14px; cursor: pointer; border-radius: 999px;
    }
    .filter:hover, .filter.active { background: var(--accent); color: #080808; border-color: var(--accent); }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 32px 0 110px; }
    .card {
      min-height: 260px; padding: 26px; border: 1px solid var(--line); background: rgba(16,18,15,.94);
      display: flex; flex-direction: column; transition: transform .22s ease, border-color .22s ease, background .22s ease;
      position: relative; overflow: hidden;
    }
    .card::after { content: ""; width: 90px; height: 3px; background: var(--accent); position: absolute; left: 26px; bottom: 0; transform: scaleX(0); transform-origin: left; transition: .22s; }
    .card:hover { transform: translateY(-5px); border-color: #555d50; background: #151814; }
    .card:hover::after { transform: scaleX(1); }
    .card-top { display: flex; justify-content: space-between; color: var(--muted); font: 12px monospace; letter-spacing: .08em; }
    .tag { color: var(--green); }
    .card h3 { margin: 52px 0 12px; font-size: 24px; letter-spacing: -.02em; }
    .card p { margin: 0; color: var(--muted); line-height: 1.65; font-size: 14px; }
    .open { margin-top: auto; padding-top: 24px; color: var(--accent); font: 700 12px monospace; letter-spacing: .1em; }
    .empty { grid-column: 1/-1; color: var(--muted); padding: 50px 0; text-align: center; }

    footer { border-top: 1px solid var(--line); padding: 28px 0 44px; color: var(--muted); font: 12px monospace; }
    footer .shell { display: flex; justify-content: space-between; gap: 20px; }

    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; gap: 36px; padding-top: 72px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .nav-links { display: none; }
    }
    @media (max-width: 560px) {
      .shell { width: min(100% - 28px, 1180px); }
      .grid { grid-template-columns: 1fr; }
      .section-head { align-items: start; flex-direction: column; }
      h1 { font-size: 56px; }
      footer .shell { flex-direction: column; }
    }
    @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; transition: none !important; } }
  </style>
</head>
<body>
  <header>
    <nav class="shell" aria-label="主選單">
      <a class="brand" href="#top"><span class="brand-mark"><span>⌁</span></span> ENG. TOOLBOX</a>
      <div class="nav-links"><a href="#tools">計算工具</a><a href="https://github.com/" target="_blank" rel="noreferrer">GitHub ↗</a></div>
    </nav>
  </header>

  <main id="top">
    <section class="hero shell">
      <div>
        <div class="eyebrow">Civil × Geotechnical Engineering</div>
        <h1>工程計算，<br><em>集中於此。</em></h1>
        <p class="intro">將常用的土木工程與大地工程計算工具整理成一個快速入口。資料清楚、操作直接，讓每一次工程判斷更有效率。</p>
      </div>
      <div class="status"><span>TOOLBOX STATUS</span><strong><span id="tool-count">00</span> TOOLS</strong><span>STATIC HTML · GITHUB PAGES READY</span></div>
    </section>

    <section id="tools" class="shell">
      <div class="section-head">
        <div><div class="eyebrow">Calculation Library</div><h2>工程工具庫</h2></div>
        <div class="filters" role="group" aria-label="工具分類">
          <button class="filter active" data-filter="all">全部</button>
          <button class="filter" data-filter="civil">土木工程</button>
          <button class="filter" data-filter="geo">大地工程</button>
        </div>
      </div>
      <div class="grid" id="tool-grid"></div>
    </section>
  </main>

  <footer><div class="shell"><span>© <span id="year"></span> ENG. TOOLBOX</span><span>DESIGNED FOR ENGINEERING PRACTICE</span></div></footer>

  <script>
    // 修改這裡即可新增、刪除或更換你的工具連結。
    const tools = [
      { title: '擋土牆穩定分析', category: 'geo', code: 'GEO-01', description: '計算滑動、傾覆及地基承載力安全係數。', url: './tools/retaining-wall.html' },
      { title: '淺基礎承載力', category: 'geo', code: 'GEO-02', description: '依土壤參數估算極限與容許承載力。', url: './tools/bearing-capacity.html' },
      { title: '邊坡穩定分析', category: 'geo', code: 'GEO-03', description: '快速檢核邊坡幾何與土壤強度條件。', url: './tools/slope-stability.html' },
      { title: '鋼筋混凝土梁', category: 'civil', code: 'CIV-01', description: 'RC 梁彎矩強度與配筋需求快速計算。', url: './tools/rc-beam.html' },
      { title: '明渠流量計算', category: 'civil', code: 'CIV-02', description: '使用曼寧公式計算流速與渠道流量。', url: './tools/open-channel.html' },
      { title: '工程單位換算', category: 'civil', code: 'CIV-03', description: '常用力、壓力、長度與重量單位換算。', url: './tools/unit-converter.html' }
    ];

    const grid = document.querySelector('#tool-grid');
    const labels = { civil: '土木工程', geo: '大地工程' };

    function render(filter = 'all') {
      const visible = filter === 'all' ? tools : tools.filter(tool => tool.category === filter);
      grid.innerHTML = visible.length ? visible.map(tool => `
        <a class="card" href="${tool.url}" aria-label="開啟${tool.title}">
          <div class="card-top"><span>${tool.code}</span><span class="tag">● ${labels[tool.category]}</span></div>
          <h3>${tool.title}</h3><p>${tool.description}</p><span class="open">OPEN TOOL ↗</span>
        </a>`).join('') : '<p class="empty">這個分類目前沒有工具。</p>';
    }

    document.querySelectorAll('.filter').forEach(button => button.addEventListener('click', () => {
      document.querySelector('.filter.active').classList.remove('active');
      button.classList.add('active');
      render(button.dataset.filter);
    }));
    document.querySelector('#tool-count').textContent = String(tools.length).padStart(2, '0');
    document.querySelector('#year').textContent = new Date().getFullYear();
    render();
  </script>
</body>
</html>
